---
dependency:
  name: galaxy
  enabled: false
  options:
    role-file: requirements.yml
driver:
  name: docker
lint: |
  yamllint .
  ansible-lint
  flake8
platforms:
  - name: ubuntu2204
    image: mrlesmithjr/ubuntu:22.04
    privileged: true
    command: /lib/systemd/systemd
    # tmpfs:
    #   - /run
    #   - /tmp
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    # groups: []
    capabilities:
      # - SYS_ADMIN
      - AUDIT_CONTROL
      - AUDIT_READ
    # pid_mode: host
provisioner:
  name: ansible
  playbooks:
    converge: ../shared/converge.yml
    prepare: ../shared/prepare.yml
  config_options:
    defaults:
      remote_tmp: /tmp
verifier:
  name: ansible
